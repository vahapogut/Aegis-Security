rule:
  id: "ai-hardcoded-secret"
  language: "typescript"
  confidence: "HIGH"
  message: "Hardcoded secret detected. AI generated code often leaves placeholder tokens or passwords."
  explanation: "AI coding assistants frequently insert mock API keys (like 'sk-test' or 'YOUR_KEY_HERE') which developers forget to move into environment variables, risking exposure in version control."
  query: >
    [
      (variable_declarator
        name: (identifier) @name
        value: (string) @val
        (#match? @name "(?i)(secret|password|api_key|token)")
        (#not-match? @val "^['\"]$|^['\"]\\s*['\"]$")
      )
      (pair
        key: (property_identifier) @name
        value: (string) @val
        (#match? @name "(?i)(secret|password|api_key|token)")
        (#not-match? @val "^['\"]$|^['\"]\\s*['\"]$")
      )
    ]
