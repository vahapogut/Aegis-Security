rule:
  id: "ai-hardcoded-secret-py"
  language: "python"
  confidence: "HIGH"
  message: "Hardcoded secret detected in Python code."
  explanation: "AI coding assistants frequently insert placeholder credentials like 'sk-test' or 'changeme' directly in Python source files. Move secrets to environment variables using os.environ or a .env file."
  query: >
    (assignment
      left: (identifier) @name
      right: (string) @val
      (#match? @name "(?i)(secret|password|api_key|token|auth)")
      (#not-match? @val "^['\"]$|^['\"]\\s*['\"]$")
    )
