rule:
  id: "ai-plaintext-password"
  language: "python"
  confidence: "HIGH"
  message: "Password stored or compared in plaintext — use a password hash (bcrypt, argon2)."
  explanation: "AI assistants frequently generate authentication code that compares plaintext passwords directly against stored values. Always hash passwords with bcrypt, argon2, or scrypt. Never store or compare plaintext passwords."
  query: >
    (comparison_operator
      left: (identifier) @var
      right: (identifier) @pw
      (#match? @pw "(?i)(password|passwd|pwd|secret)")
    )
