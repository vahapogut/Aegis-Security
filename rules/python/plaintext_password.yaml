rule:
  id: "ai-plaintext-password"
  language: "python"
  confidence: "HIGH"
  message: "Password comparison detected — potential plaintext password check."
  explanation: "AI assistants frequently generate authentication code that compares passwords with == instead of using proper password hashing (bcrypt, argon2). Never compare plaintext passwords directly."
  query: >
    (comparison_operator
      (identifier) @pw
      (#match? @pw "(?i)(password|passwd|pwd|secret|pin)")
    )
