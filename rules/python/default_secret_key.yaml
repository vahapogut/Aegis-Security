rule:
  id: "ai-default-secret-key"
  language: "python"
  confidence: "HIGH"
  message: "Hardcoded Django SECRET_KEY with a default/placeholder value."
  explanation: "AI generates Django settings with placeholder SECRET_KEY values like 'your-secret-key' or 'django-insecure-...'. In production, this key is used for cryptographic signing of sessions, CSRF tokens, and password reset tokens. Generate a proper random key and load it from environment variables."
  query: >
    (assignment
      left: (identifier) @var
      (#eq? @var "SECRET_KEY")
      right: (string) @val
    )
