rule:
  id: "ai-broad-except"
  language: "python"
  confidence: "MEDIUM"
  message: "Try block catching Exception or BaseException — too broad, masks unexpected errors."
  explanation: "AI models often overuse `except Exception as e:` which catches KeyboardInterrupt, SystemExit, and other signals that should propagate. Catch specific exception types (ValueError, IOError, etc.) instead. Broad excepts hide bugs and make debugging difficult."
  query: >
    (except_clause
      (pattern
        (identifier) @ex
        (#match? @ex "^(Exception|BaseException)$")
      )
    )
