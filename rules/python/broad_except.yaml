rule:
  id: "ai-broad-except"
  language: "python"
  confidence: "MEDIUM"
  message: "Broad exception catch — AI often catches Exception which masks bugs."
  explanation: "AI models overuse `except Exception as e:` which catches too many error types and can hide real bugs. Use specific exception types (ValueError, IOError, etc.) and always log or re-raise."
  query: >
    (except_clause
      (identifier) @ex
      (#match? @ex "^(Exception|BaseException)$")
    )
