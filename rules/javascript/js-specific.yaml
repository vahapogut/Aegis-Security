rule:
  id: "ai-hardcoded-secret-js"
  language: "typescript"
  confidence: "HIGH"
  message: "Hardcoded credential detected (JavaScript)."
  explanation: "AI assistants often generate JavaScript code with hardcoded secrets instead of using environment variables or secure vaults. Move credentials to process.env or a secrets manager."
  query: >
    (variable_declarator
      name: (identifier) @name
      (#match? @name "(?i)(secret|password|api_key|apikey|token|credential)")
      value: [
        (string (string_fragment) @val)
        (template_string (string_fragment) @val)
      ]
      (#not-match? @val "^$")
    )

---
rule:
  id: "ai-unsafe-eval"
  language: "typescript"
  confidence: "HIGH"
  message: "Unsafe eval() or Function() constructor detected."
  explanation: "AI-generated code sometimes uses eval() or new Function() for dynamic execution, which enables code injection attacks. Use a sandboxed interpreter or avoid dynamic execution entirely."
  query: >
    (call_expression
      function: (identifier) @fn
      (#match? @fn "^(eval)$")
    )

---
rule:
  id: "ai-no-csrf"
  language: "typescript"
  confidence: "HIGH"
  message: "POST/PUT/DELETE route missing CSRF protection."
  explanation: "AI assistants commonly scaffold Express/Fastify routes that modify state (POST, PUT, DELETE) without CSRF tokens. Add csurf middleware or use SameSite cookies with proper CSRF validation."
  query: >
    (call_expression
      function: (member_expression
        object: (identifier) @obj
        property: (property_identifier) @method
        (#match? @method "^(post|put|delete|patch)$")
      )
    )

---
rule:
  id: "ai-weak-crypto"
  language: "typescript"
  confidence: "HIGH"
  message: "Weak cryptographic algorithm detected (MD5, SHA1, DES)."
  explanation: "AI models frequently generate code with outdated cryptographic algorithms like MD5 or SHA-1 for hashing and DES for encryption. Use SHA-256 or better for hashing, AES-256-GCM for encryption."
  query: >
    (call_expression
      function: (member_expression
        property: (property_identifier) @algo
        (#match? @algo "^(createHash|createHmac)$")
      )
      arguments: (arguments
        (string (string_fragment) @hash)
        (#match? @hash "(?i)(md5|sha1|SHA1|DES|RC4)")
      )
    )

---
rule:
  id: "ai-missing-auth-check"
  language: "typescript"
  confidence: "HIGH"
  message: "Route handler without authentication middleware."
  explanation: "AI-generated route handlers often omit authentication middleware checks. Ensure all protected routes have auth middleware (JWT verify, session check, or API key validation) applied before the handler."
  query: >
    (call_expression
      function: (member_expression
        object: (identifier) @obj
        property: (property_identifier) @method
        (#match? @method "^(get|post|put|delete|patch|all)$")
      )
    )
