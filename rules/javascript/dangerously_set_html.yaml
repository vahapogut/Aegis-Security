rule:
  id: "ai-dangerously-set-html"
  language: "typescript"
  confidence: "HIGH"
  message: "React dangerouslySetInnerHTML with unsanitized input — XSS vector."
  explanation: "AI assistants commonly use dangerouslySetInnerHTML to render user-generated content without sanitization, creating Cross-Site Scripting (XSS) vulnerabilities. Always sanitize HTML with DOMPurify, sanitize-html, or a similar library before rendering."
  query: >
    (jsx_attribute
      (property_identifier) @attr
      (#eq? @attr "dangerouslySetInnerHTML")
    )
